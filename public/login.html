<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Insights</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ─── Tokens ─────────────────────────────────────────────────── */
    :root {
      --blue:        #2563eb;
      --blue-light:  #3b82f6;
      --blue-dim:    #dbeafe;
      --blue-ink:    #1e3a8a;
      --red:         #dc2626;
      --red-dim:     #fee2e2;
      --ink-0:  #0f172a;
      --ink-1:  #1e293b;
      --ink-2:  #334155;
      --ink-3:  #475569;
      --ink-4:  #64748b;
      --ink-5:  #94a3b8;
      --ink-6:  #cbd5e1;
      --ink-7:  #e2e8f0;
      --ink-8:  #f1f5f9;
      --ink-9:  #f8fafc;
      --white:  #ffffff;
      --radius: 4px;
      --mono:   'IBM Plex Mono', monospace;
      --sans:   'IBM Plex Sans', sans-serif;
      --shadow-sm: 0 1px 3px rgba(15,23,42,.08), 0 1px 2px rgba(15,23,42,.06);
      --shadow:    0 4px 12px rgba(15,23,42,.10), 0 2px 4px rgba(15,23,42,.06);
      --shadow-lg: 0 20px 48px rgba(15,23,42,.14), 0 8px 16px rgba(15,23,42,.08);
    }

    /* ─── Reset ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; -webkit-font-smoothing: antialiased; }

    /* ─── Page ───────────────────────────────────────────────────── */
    body {
      font-family: var(--sans);
      background: var(--ink-9);
      color: var(--ink-1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--ink-7) 1px, transparent 1px),
        linear-gradient(90deg, var(--ink-7) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.4;
      pointer-events: none;
    }

    /* ─── Card ───────────────────────────────────────────────────── */
    .login-card {
      background: var(--white);
      border: 1px solid var(--ink-7);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 380px;
      position: relative;
      animation: card-in .3s cubic-bezier(.34,1.3,.64,1) forwards;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(-12px) scale(.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ─── Card Header ────────────────────────────────────────────── */
    .card-header {
      padding: 28px 28px 24px;
      border-bottom: 1px solid var(--ink-7);
      background: var(--ink-0);
      border-radius: var(--radius) var(--radius) 0 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }

    .brand {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--white);
      letter-spacing: .1em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--blue-light);
      box-shadow: 0 0 8px var(--blue-light);
      animation: pulse-dot 2.4s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--blue-light); }
      50%       { opacity: .6; box-shadow: 0 0 4px var(--blue-light); }
    }

    .card-subtitle {
      font-size: 12px;
      color: var(--ink-5);
      font-family: var(--mono);
      letter-spacing: .04em;
      margin-top: 2px;
    }

    /* ─── Card Body ──────────────────────────────────────────────── */
    .card-body {
      padding: 24px 28px 28px;
    }

    /* ─── Form ───────────────────────────────────────────────────── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-group + .form-group {
      margin-top: 14px;
    }

    .form-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--ink-3);
      letter-spacing: .06em;
      text-transform: uppercase;
      font-family: var(--mono);
    }

    .form-input {
      padding: 9px 12px;
      border: 1px solid var(--ink-6);
      border-radius: var(--radius);
      font-family: var(--sans);
      font-size: 13px;
      color: var(--ink-1);
      background: var(--white);
      transition: border-color .15s, box-shadow .15s;
      width: 100%;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-dim);
    }

    .form-input::placeholder {
      color: var(--ink-5);
    }

    /* ─── Error ──────────────────────────────────────────────────── */
    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--red-dim);
      border: 1px solid #fca5a5;
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--red);
      font-family: var(--mono);
      margin-bottom: 16px;
      animation: shake .3s cubic-bezier(.36,.07,.19,.97);
    }

    .error-msg.visible {
      display: flex;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-4px); }
      40%       { transform: translateX(4px); }
      60%       { transform: translateX(-3px); }
      80%       { transform: translateX(3px); }
    }

    .error-icon {
      font-size: 13px;
      flex-shrink: 0;
    }

    /* ─── Submit Button ──────────────────────────────────────────── */
    .btn-submit {
      width: 100%;
      margin-top: 20px;
      padding: 10px 14px;
      background: var(--blue);
      color: var(--white);
      border: 1px solid var(--blue);
      border-radius: var(--radius);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .02em;
      cursor: pointer;
      transition: background .15s, border-color .15s, box-shadow .15s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .btn-submit:hover {
      background: var(--blue-light);
      border-color: var(--blue-light);
      box-shadow: 0 0 0 3px var(--blue-dim);
    }

    .btn-submit:active {
      transform: translateY(1px);
    }

    .btn-submit:disabled {
      opacity: .55;
      cursor: not-allowed;
      pointer-events: none;
    }

    .btn-submit .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin .65s linear infinite;
      display: none;
    }

    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-text { opacity: .7; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Footer ─────────────────────────────────────────────────── */
    .card-footer {
      padding: 12px 28px;
      border-top: 1px solid var(--ink-8);
      background: var(--ink-9);
      border-radius: 0 0 var(--radius) var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-footer span {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--ink-5);
      letter-spacing: .06em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="card-header">
    <div class="brand">
      <span class="brand-dot"></span>
      INSIGHTS
    </div>
    <div class="card-subtitle">Sign in to continue</div>
  </div>

  <div class="card-body">
    <div class="error-msg" id="error-msg">
      <span class="error-icon">✕</span>
      <span id="error-text">Invalid username or password.</span>
    </div>

    <form id="login-form" onsubmit="handleSubmit(event)" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input
          class="form-input"
          id="username"
          name="username"
          type="text"
          placeholder="Enter username"
          autocomplete="username"
          required
          autofocus
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          class="form-input"
          id="password"
          name="password"
          type="password"
          placeholder="Enter password"
          autocomplete="current-password"
          required
        >
      </div>

      <button class="btn-submit" id="submit-btn" type="submit">
        <div class="spinner"></div>
        <span class="btn-text">Sign in</span>
      </button>
    </form>
  </div>

  <div class="card-footer">
    <span>Insights Service</span>
  </div>
</div>

<script>
  // Show error if redirected with ?error=1
  if (new URLSearchParams(location.search).get('error')) {
    document.getElementById('error-msg').classList.add('visible')
  }

  async function handleSubmit(e) {
    e.preventDefault()
    const btn = document.getElementById('submit-btn')
    const errorEl = document.getElementById('error-msg')

    btn.classList.add('loading')
    btn.disabled = true
    errorEl.classList.remove('visible')

    const username = document.getElementById('username').value
    const password = document.getElementById('password').value

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })

      if (res.ok) {
        const redirect = new URLSearchParams(location.search).get('redirect') || '/'
        location.href = redirect
      } else {
        const data = await res.json().catch(() => ({}))
        document.getElementById('error-text').textContent =
          data?.error?.message || 'Invalid username or password.'
        errorEl.classList.add('visible')
        document.getElementById('password').value = ''
        document.getElementById('password').focus()
      }
    } catch {
      document.getElementById('error-text').textContent = 'Connection error. Please try again.'
      errorEl.classList.add('visible')
    } finally {
      btn.classList.remove('loading')
      btn.disabled = false
    }
  }
</script>

</body>
</html>
